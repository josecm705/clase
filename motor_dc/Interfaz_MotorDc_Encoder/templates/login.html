<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>

  <link rel="stylesheet" href="/static/css/style.css" />

  <style>
    /* Ajustes específicos del login */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      width: 350px;
      text-align: center;
    }

    .login-box h1 {
      margin-bottom: 20px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
    }

    input:focus {
      box-shadow: 0 0 5px #3b82f6;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #2563eb;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #94a3b8;
    }

    .error {
      color: #ff4d4d;
    }
  </style>
</head>

<body>

  <main class="card login-box">

    <h1>🔐 Acceso al Sistema</h1>

    <form method="POST" action="/login">

      <div class="form-group">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required />
      </div>

      <button class="btn" type="submit">Entrar</button>

      {% if error %}
        <p class="hint error">{{ error }}</p>
      {% else %}
        <p class="hint">Ingresa tus credenciales</p>
      {% endif %}

    </form>

  </main>

</body>
</html>
